name: Build Keepsake APK

# Runs automatically every time you push code, and can also be triggered
# manually from the Actions tab on GitHub. No computer needed — GitHub's
# servers do the actual build.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: keepsake-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keepsake-release.keystore

      - name: Build signed release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keepsake-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: gradle bundleRelease

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: keepsake-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
