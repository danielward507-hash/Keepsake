name: Build Keepsake APK

# Runs automatically every time you push code, and can also be triggered
# manually from the Actions tab on GitHub. No computer needed — GitHub's
# servers do the actual build.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: keepsake-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
